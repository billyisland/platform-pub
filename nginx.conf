events {
    worker_connections 1024;
}

http {
    # MIME types for static media serving
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name all.haus;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        # HTTP/2 multiplexing — removes the per-request H1 connection setup that
        # the client-side fetch waterfall pays (performance audit #2). Modern
        # directive form (nginx >= 1.25.1; the stock nginx:alpine image is well
        # past that). Brotli and upstream keepalive are deliberately NOT added
        # here: nginx:alpine ships no ngx_brotli module (a `brotli` directive
        # would fail `nginx -t` and the container would refuse to start), and
        # upstream keepalive needs `upstream` blocks that, in open-source nginx,
        # defeat the dynamic-resolver re-resolution this config relies on after a
        # container rebuild — for negligible gain on a loopback Docker network.
        # See docs/audits/allhaus-performance-audit.md §2.
        http2 on;
        server_name all.haus;

        ssl_certificate /etc/letsencrypt/live/all.haus/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/all.haus/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data: https:; font-src 'self'; connect-src 'self' wss: https: https://api.stripe.com; frame-src https://js.stripe.com" always;

        # Use Docker's embedded DNS so upstream hostnames are re-resolved
        # dynamically after container restarts rather than cached at startup.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # API gateway — all /api/ requests
        location /api/ {
            set $upstream_gateway http://gateway:3000;
            proxy_pass $upstream_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 12m;
        }

        # AT Protocol OAuth client metadata + JWKS — discovered by Bluesky PDSes
        location = /.well-known/oauth-client-metadata.json {
            set $upstream_gateway http://gateway:3000;
            proxy_pass $upstream_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /.well-known/jwks.json {
            set $upstream_gateway http://gateway:3000;
            proxy_pass $upstream_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # NIP-05 — resolve <name>@all.haus to a Nostr pubkey. The gateway sends
        # Cache-Control: no-store and Access-Control-Allow-Origin: *; do not add
        # caching here (a username change must propagate within the redirect
        # window) and do not strip the upstream CORS header.
        location = /.well-known/nostr.json {
            set $upstream_gateway http://gateway:3000;
            proxy_pass $upstream_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Traffology ingest — PARKED (architecture-audit item 8, 2026-06-16).
        # The traffology-ingest container is stopped and the client beacon is
        # gated off at source, so nothing should reach this path. Any straggler
        # beacon (e.g. a stale cached page) gets a cheap 404 instead of a 502
        # against a missing upstream. To un-park: restore the proxy_pass block.
        location /ingest/ {
            return 404;
        }

        # Nostr relay — WebSocket upgrade
        location /relay {
            set $upstream_strfry http://strfry:7777;
            proxy_pass $upstream_strfry/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Media — static files from the shared volume
        # Images are written by the gateway to /app/media/<sha256>.webp
        # and served here as /media/<sha256>.webp
        location /media/ {
            alias /app/media/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data: https:; font-src 'self'; connect-src 'self' wss: https: https://api.stripe.com; frame-src https://js.stripe.com" always;
            try_files $uri =404;
        }

        # Web client — everything else
        location / {
            set $upstream_web http://web:3000;
            proxy_pass $upstream_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
