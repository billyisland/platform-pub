events {
    worker_connections 1024;
}

http {
    # MIME types for static media serving
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name platform.pub;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name platform.pub;

        ssl_certificate /etc/letsencrypt/live/platform.pub/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/platform.pub/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # API gateway — all /api/ requests
        location /api/ {
            proxy_pass http://gateway:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 12m;
        }

        # Nostr relay — WebSocket upgrade
        location /relay {
            proxy_pass http://strfry:7777/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Media — static files from the shared volume
        # Images are written by the gateway to /app/media/<sha256>.webp
        # and served here as /media/<sha256>.webp
        location /media/ {
            alias /app/media/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            try_files $uri =404;
        }

        # Web client — everything else
        location / {
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
