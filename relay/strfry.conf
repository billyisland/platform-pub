##
## strfry configuration for all.haus
##
## This relay stores all Nostr events for the hosted platform:
##   - kind 1:     Notes (short-form social posts)
##   - kind 3:     Contact lists (follows)
##   - kind 5:     Deletion events
##   - kind 7:     Reactions
##   - kind 9901:  Consumption receipts (platform-signed)
##   - kind 30023: NIP-23 long-form articles
##   - kind 30024: NIP-23 drafts
##   - kind 39701: Vault events (encrypted paywalled bodies)
##
## The relay is permissive for reads (any client can fetch public events)
## but write access is controlled by the platform's publishing pipeline.
##

db = "./strfry-db/"

dbParams {
    # Maximum database size — 8GB should be plenty for launch cohort
    maxreaders = 256
    mapsize = 8589934592
}

relay {
    bind = "0.0.0.0"
    port = 7777
    noFiles = 1000

    realIpHeader = ""

    info {
        name = "all.haus relay"
        description = "Nostr relay for all.haus — a publishing platform for writers and readers"
        pubkey = ""
        contact = ""
    }

    maxWebsocketPayloadSize = 524288

    autoPingSeconds = 55

    enableTcpKeepalive = false

    queryTimesliceBudgetMicroseconds = 10000
    maxFilterLimit = 500
    maxSubsPerConnection = 20
}

events {
    # Maximum event size — 512KB to accommodate long articles
    maxEventSize = 524288

    # Event retention — keep everything (no expiry at launch).
    #
    # NOTE: rejectEventsOlderThanSeconds is a REJECT WINDOW, not a retention
    # switch — strfry rejects any event whose created_at is older than this
    # many seconds. 0 does NOT mean "no limit"; it means "reject everything
    # not dated in the future", which silently rejected every native publish
    # with `invalid: created_at too early`. Larger = more permissive.
    # 10 years also lets a stale relay_outbox backlog redrive after an outage
    # (a signature covers created_at, so stale rows cannot be freshened).
    rejectEventsNewerThanSeconds = 60
    rejectEventsOlderThanSeconds = 315360000
    rejectEphemeralEventsOlderThanSeconds = 60

    # NIP-20 command results
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}
