name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci

      # Build all backend workspaces (tsc --noEmit would miss the emit path;
      # a full build exercises the real compilation consumers run).
      - run: npm run build --workspaces --if-present

      # Ledger dual-write tripwire (audit item 3): every money-write site must
      # carry a recordLedger() call in the same transaction, and no new
      # money-write site may appear unregistered. Pure text, no DB.
      - name: ledger adjacency (money writes ↔ ledger entries)
        run: scripts/check-ledger-adjacency.sh

      # Backend ESLint (promise-safety rules)
      - run: npx eslint

      # Knip — strict gate on all high-signal categories (default set).
      - run: npx knip

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test --workspaces --if-present

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npx next lint
      - run: cd web && npx vitest run

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Same image as dev/prod, so pg_dump output matches the committed schema.sql.
      - name: Start Postgres 16
        run: |
          docker run -d --name schemacheck-pg \
            -e POSTGRES_USER=platformpub \
            -e POSTGRES_PASSWORD=ci-postgres-pw \
            -e POSTGRES_DB=platformpub \
            -p 5432:5432 postgres:16-alpine
          for _ in $(seq 1 30); do
            docker exec schemacheck-pg pg_isready -U platformpub && break
            sleep 1
          done
      # Fails if schema.sql has drifted from migrations/ (missing seed row,
      # a migration-created object absent from schema.sql, a pending migration
      # on a schema.sql-built DB, or a non-canonical dump).
      - name: schema.sql ↔ migrations consistency
        env:
          PG_CONTAINER: schemacheck-pg
          POSTGRES_PASSWORD: ci-postgres-pw
        run: scripts/check-schema-drift.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: cd web && npm ci
      - name: Audit workspaces + web (high/critical only)
        run: |
          failed=0
          echo "=== Auditing backend workspaces ==="
          npm audit --audit-level=high || failed=1
          echo "=== Auditing web ==="
          (cd web && npm audit --audit-level=high) || failed=1
          exit $failed
