<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
  <!-- Scaled-down ForallMenu mark: a black disc divided by three floor-coloured
       bars into the ∀ (two diagonals carving complete segments + a crossbar).
       Bars are clipped to the disc here so the tab corners stay transparent. -->
  <defs>
    <clipPath id="disc"><circle cx="28" cy="28" r="28"/></clipPath>
  </defs>
  <circle cx="28" cy="28" r="28" fill="#1A1A18"/>
  <g clip-path="url(#disc)" fill="none" stroke="#F0EFEB" stroke-width="6" stroke-linecap="round">
    <line x1="28" y1="56" x2="8.5" y2="5"/>
    <line x1="28" y1="56" x2="47.5" y2="5"/>
    <line x1="17.3" y1="28" x2="38.7" y2="28"/>
  </g>
</svg>
